name: ShopKart Report

on:
  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: write

jobs:
  allure-report:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0


      - name: Setup Java 22
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 22
          cache: gradle


      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4


      - name: Make Gradle Executable
        run: chmod +x gradlew


      - name: Check Gradle
        run: ./gradlew --version


      - name: Build Project
        run: ./gradlew clean testClasses


      - name: Run Cucumber Smoke Tests
        run: ./gradlew cucumberSmoke --no-configuration-cache
        continue-on-error: true


      - name: Copy Allure Environment
        if: always()
        run: |
          mkdir -p build/allure-results

          if [ -f src/test/resources/environment.properties ]; then
            cp src/test/resources/environment.properties \
               build/allure-results/environment.properties
          fi


      - name: Checkout gh-pages Branch
        if: always()
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages


      - name: Generate Allure Report
        if: always()
        uses: simple-elf/allure-report-action@master
        with:
          allure_results: build/allure-results
          allure_report: allure-report
          gh_pages: gh-pages
          allure_history: allure-history


      - name: Deploy to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history