name: ShopKart CI and Allure Report

on:
  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: write

jobs:
  shopkart-tests:

    runs-on: ubuntu-22.04

    env:
      CI: "true"

      SHOPKART_ALICE_PASSWORD: ${{ secrets.SHOPKART_ALICE_PASSWORD }}
      SHOPKART_BOB_PASSWORD: ${{ secrets.SHOPKART_BOB_PASSWORD }}
      SHOPKART_CAROL_PASSWORD: ${{ secrets.SHOPKART_CAROL_PASSWORD }}

      DB_HOST: localhost
      DB_PORT: 3306
      DB_NAME: shopkart
      DB_USER: root
      DB_PASSWORD: root

    services:

      mysql:
        image: mysql:8.0

        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: shopkart

        ports:
          - 3306:3306

        options: >-
          --health-cmd="mysqladmin ping -h localhost -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:

      # ============================================================
      # CHECKOUT
      # ============================================================

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0


      # ============================================================
      # JAVA 22
      # ============================================================

      - name: Setup Java 22
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 22
          cache: gradle


      # ============================================================
      # GRADLE
      # ============================================================

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4


      - name: Make Gradle Executable
        run: chmod +x gradlew


      - name: Verify Java and Gradle
        run: |
          echo "Java version:"
          java -version

          echo "Gradle version:"
          ./gradlew --version


      # ============================================================
      # CHROME
      # ============================================================

      - name: Setup Chrome
        id: setup-chrome
        uses: browser-actions/setup-chrome@v2
        with:
          chrome-version: stable
          install-chromedriver: true
          install-dependencies: true


      - name: Verify Chrome
        run: |
          echo "Chrome binary:"
          echo "${{ steps.setup-chrome.outputs.chrome-path }}"

          "${{ steps.setup-chrome.outputs.chrome-path }}" --version

          echo "ChromeDriver:"
          chromedriver --version || true


      # ============================================================
      # MYSQL
      # ============================================================

      - name: Wait for MySQL
        run: |
          echo "Waiting for MySQL..."

          for i in {1..30}; do

            if mysqladmin ping \
              -h 127.0.0.1 \
              -P 3306 \
              -u root \
              -proot \
              --silent; then

              echo "MySQL is ready"

              exit 0

            fi

            echo "Waiting for MySQL..."

            sleep 2

          done

          echo "MySQL failed to start"

          exit 1


      # ============================================================
      # DATABASE MIGRATIONS
      # ============================================================

      - name: Initialize Test Database
        run: |
          echo "Searching for database migrations..."

          find src/test/resources \
            -type f \
            -name "*.sql" \
            -print || true


          SCHEMA_FILE=$(find src/test/resources \
            -type f \
            -name "V1__schema.sql" \
            | head -n 1)


          SEED_FILE=$(find src/test/resources \
            -type f \
            -name "V2__seed.sql" \
            | head -n 1)


          if [ -n "$SCHEMA_FILE" ]; then

            echo "Executing schema:"
            echo "$SCHEMA_FILE"

            mysql \
              -h 127.0.0.1 \
              -P 3306 \
              -u root \
              -proot \
              shopkart \
              < "$SCHEMA_FILE"

          else

            echo "V1__schema.sql not found"

          fi


          if [ -n "$SEED_FILE" ]; then

            echo "Executing seed:"
            echo "$SEED_FILE"

            mysql \
              -h 127.0.0.1 \
              -P 3306 \
              -u root \
              -proot \
              shopkart \
              < "$SEED_FILE"

          else

            echo "V2__seed.sql not found"

          fi


      # ============================================================
      # COMPILE AUTOMATION PROJECT
      # ============================================================

      - name: Compile ShopKart Automation Project
        run: |
          ./gradlew \
            clean \
            testClasses \
            --no-configuration-cache


      # ============================================================
      # PREPARE ALLURE
      # ============================================================

      - name: Prepare Allure Results
        run: |
          mkdir -p build/allure-results


      # ============================================================
      # CUCUMBER SMOKE
      # ============================================================

      - name: Run Cucumber Smoke Scenarios
        continue-on-error: true

        env:
          CI: "true"

          CHROME_BIN: ${{ steps.setup-chrome.outputs.chrome-path }}

          SHOPKART_ALICE_PASSWORD: ${{ secrets.SHOPKART_ALICE_PASSWORD }}
          SHOPKART_BOB_PASSWORD: ${{ secrets.SHOPKART_BOB_PASSWORD }}
          SHOPKART_CAROL_PASSWORD: ${{ secrets.SHOPKART_CAROL_PASSWORD }}

          DB_PASSWORD: root

        run: |
          ./gradlew \
            cucumberSmoke \
            --no-configuration-cache \
            -Dheadless=true \
            -DbaseUrl=http://localhost:8080 \
            -Ddb.host=localhost \
            -Ddb.port=3306 \
            -Ddb.name=shopkart \
            -Ddb.user=root


      # ============================================================
      # CUCUMBER NEGATIVE
      # ============================================================

      - name: Run Cucumber Negative Scenarios
        continue-on-error: true

        env:
          CI: "true"

          CHROME_BIN: ${{ steps.setup-chrome.outputs.chrome-path }}

          SHOPKART_ALICE_PASSWORD: ${{ secrets.SHOPKART_ALICE_PASSWORD }}
          SHOPKART_BOB_PASSWORD: ${{ secrets.SHOPKART_BOB_PASSWORD }}
          SHOPKART_CAROL_PASSWORD: ${{ secrets.SHOPKART_CAROL_PASSWORD }}

          DB_PASSWORD: root

        run: |
          ./gradlew \
            cucumberNegative \
            --no-configuration-cache \
            -Dheadless=true \
            -DbaseUrl=http://localhost:8080 \
            -Ddb.host=localhost \
            -Ddb.port=3306 \
            -Ddb.name=shopkart \
            -Ddb.user=root


      # ============================================================
      # CUCUMBER E2E
      # ============================================================

      - name: Run Cucumber E2E Scenarios
        continue-on-error: true

        env:
          CI: "true"

          CHROME_BIN: ${{ steps.setup-chrome.outputs.chrome-path }}

          SHOPKART_ALICE_PASSWORD: ${{ secrets.SHOPKART_ALICE_PASSWORD }}
          SHOPKART_BOB_PASSWORD: ${{ secrets.SHOPKART_BOB_PASSWORD }}
          SHOPKART_CAROL_PASSWORD: ${{ secrets.SHOPKART_CAROL_PASSWORD }}

          DB_PASSWORD: root

        run: |
          ./gradlew \
            cucumberE2E \
            --no-configuration-cache \
            -Dheadless=true \
            -DbaseUrl=http://localhost:8080 \
            -Ddb.host=localhost \
            -Ddb.port=3306 \
            -Ddb.name=shopkart \
            -Ddb.user=root


      # ============================================================
      # COPY ALLURE CONFIGURATION
      # ============================================================

      - name: Copy Allure Configuration
        if: always()

        run: |
          mkdir -p build/allure-results


          if [ -f src/test/resources/environment.properties ]; then

            cp \
              src/test/resources/environment.properties \
              build/allure-results/environment.properties

          fi


          if [ -f src/test/resources/categories.json ]; then

            cp \
              src/test/resources/categories.json \
              build/allure-results/categories.json

          fi


      # ============================================================
      # VERIFY ALLURE RESULTS
      # ============================================================

      - name: Verify Allure Results
        if: always()

        run: |
          echo "Allure result files:"

          find build/allure-results \
            -type f \
            -print || true


          RESULT_COUNT=$(find build/allure-results \
            -type f \
            -name "*-result.json" \
            | wc -l)


          echo "Total Allure test results: $RESULT_COUNT"


      # ============================================================
      # INSTALL ALLURE
      # ============================================================

      - name: Install Allure CLI
        if: always()

        run: |
          npm install -g allure-commandline

          allure --version


      # ============================================================
      # GENERATE ALLURE REPORT
      # ============================================================

      - name: Generate Allure Report
        if: always()

        run: |
          allure generate \
            build/allure-results \
            -o allure-report \
            --clean


      # ============================================================
      # VERIFY REPORT
      # ============================================================

      - name: Verify Allure Report
        if: always()

        run: |
          if [ ! -f allure-report/index.html ]; then

            echo "Allure report was not generated"

            exit 1

          fi


          echo "Allure report generated successfully"

          ls -la allure-report/


      # ============================================================
      # DEPLOY TO GITHUB PAGES
      # ============================================================

      - name: Deploy Allure Report to GitHub Pages
        if: always()

        uses: peaceiris/actions-gh-pages@v4

        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

          publish_branch: gh-pages

          publish_dir: allure-report

          force_orphan: true