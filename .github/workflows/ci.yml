name: ShopKart CI and Allure Report

on:
  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: write

jobs:
  shopkart-tests:

    runs-on: ubuntu-22.04

    env:
      CI: "true"
      HEADLESS: "true"

      SHOPKART_ALICE_PASSWORD: ${{ secrets.SHOPKART_ALICE_PASSWORD }}
      SHOPKART_BOB_PASSWORD: ${{ secrets.SHOPKART_BOB_PASSWORD }}
      SHOPKART_CAROL_PASSWORD: ${{ secrets.SHOPKART_CAROL_PASSWORD }}

      DB_HOST: localhost
      DB_PORT: 3306
      DB_NAME: shopkart
      DB_USER: root
      DB_PASSWORD: root

    services:

      mysql:
        image: mysql:8.0

        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: shopkart

        ports:
          - 3306:3306

        options: >-
          --health-cmd="mysqladmin ping -h localhost -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0


      - name: Setup Java 22
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 22
          cache: gradle


      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4


      - name: Make Gradle Executable
        run: chmod +x gradlew


      - name: Verify Java and Gradle
        run: |
          java -version
          ./gradlew --version


      - name: Verify Chrome
        run: |
          google-chrome --version
          chromedriver --version
          which google-chrome
          which chromedriver


      - name: Wait for MySQL
        run: |
          for i in {1..30}; do
            if mysqladmin ping \
              -h 127.0.0.1 \
              -P 3306 \
              -u root \
              -proot \
              --silent; then

              echo "MySQL is ready"
              exit 0

            fi

            echo "Waiting for MySQL..."
            sleep 2
          done

          echo "MySQL did not start"
          exit 1

      - name: Find Database Schema
        run: |
          echo "Searching for SQL files..."

          find src -type f -name "*.sql" -print


      - name: Create ShopKart Database Schema
        run: |
          SCHEMA_FILE=$(find src/test/resources -type f -name "V1__schema.sql" | head -n 1)

          if [ -z "$SCHEMA_FILE" ]; then
            echo "ERROR: V1__schema.sql was not found"
            find src/test/resources -type f -print
            exit 1
          fi

          echo "Using schema file: $SCHEMA_FILE"

          mysql \
            -h 127.0.0.1 \
            -P 3306 \
            -u root \
            -proot \
            shopkart \
            < "$SCHEMA_FILE"


      - name: Verify Database Tables
        run: |
          echo "Checking ShopKart database..."

          mysql \
            -h 127.0.0.1 \
            -P 3306 \
            -u root \
            -proot \
            shopkart \
            -e "SHOW TABLES;"


      - name: Verify Product Data
        run: |
          PRODUCT_TABLE_EXISTS=$(mysql \
            -h 127.0.0.1 \
            -P 3306 \
            -u root \
            -proot \
            shopkart \
            -N \
            -e "SHOW TABLES LIKE 'products';")

          if [ "$PRODUCT_TABLE_EXISTS" != "products" ]; then
            echo "ERROR: products table was not created"

            mysql \
              -h 127.0.0.1 \
              -P 3306 \
              -u root \
              -proot \
              shopkart \
              -e "SHOW TABLES;"

            exit 1
          fi

          mysql \
            -h 127.0.0.1 \
            -P 3306 \
            -u root \
            -proot \
            shopkart \
            -e "SELECT sku, name, stock FROM products;"


      - name: Compile Test Project
        run: ./gradlew clean testClasses --no-configuration-cache


      - name: Check ShopKart Backend
        run: |
          echo "Checking ShopKart application..."
          curl --fail http://localhost:8080/ || {
            echo "ShopKart backend is not running"
            exit 1
          }


      - name: Run Cucumber Smoke Tests
        run: |
          ./gradlew cucumberSmoke \
            --no-configuration-cache \
            -Dheadless=true \
            -DbaseUrl=http://localhost:8080 \
            -Ddb.host=localhost \
            -Ddb.port=3306 \
            -Ddb.name=shopkart \
            -Ddb.user=root

        continue-on-error: true


      - name: Copy Allure Environment
        if: always()
        run: |
          mkdir -p build/allure-results

          if [ -f src/test/resources/environment.properties ]; then

            cp \
              src/test/resources/environment.properties \
              build/allure-results/environment.properties

          fi


      - name: Verify Allure Results
        if: always()
        run: |
          echo "Allure result files:"

          find build/allure-results \
            -type f \
            -maxdepth 2 \
            -print || true


      - name: Install Allure
        if: always()
        run: |
          npm install -g allure-commandline

          allure --version


      - name: Generate Allure Report
        if: always()
        run: |
          allure generate \
            build/allure-results \
            -o allure-report \
            --clean


      - name: Verify Allure Report
        if: always()
        run: |
          test -f allure-report/index.html

          echo "Allure report generated successfully"

          ls -la allure-report/


      - name: Deploy Allure Report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-report
          force_orphan: true