name: ShopKart Report

on:
  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  allure-report:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0


      - name: Setup Java 22
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 22
          cache: gradle


      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4


      - name: Make Gradle Executable
        run: chmod +x gradlew


      - name: Check Gradle
        run: ./gradlew --version


      - name: Build Project
        run: ./gradlew clean testClasses


      - name: Install Chrome Browser
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser chromium-chromedriver


      - name: Run Cucumber Smoke Tests
        run: ./gradlew cucumberSmoke --no-configuration-cache
        continue-on-error: true
        env:
          CI: "true"
          HEADLESS: "true"


      - name: Copy Allure Environment
        if: always()
        run: |
          mkdir -p build/allure-results
          
          if [ -f src/test/resources/environment.properties ]; then
            cp src/test/resources/environment.properties \
               build/allure-results/environment.properties
          fi


      - name: Verify Allure Results Exist
        if: always()
        run: |
          ls -la build/allure-results/ || echo "No allure-results found"
          find build/ -name "*.json" -type f || echo "No JSON files found"


      - name: Install Allure
        if: always()
        run: |
          sudo apt-get update
          sudo apt-get install -y default-jre
          npm install -g allure-commandline


      - name: Generate Allure Report
        if: always()
        run: |
          mkdir -p allure-report
          allure generate build/allure-results -o allure-report --clean || true
          ls -la allure-report/ || echo "Report generation had issues"


      - name: Create Dummy Index If Empty
        if: always()
        run: |
          if [ ! -f allure-report/index.html ] || [ ! -s allure-report/index.html ]; then
            mkdir -p allure-report
            cat > allure-report/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <title>Allure Report</title>
          </head>
          <body>
            <h1>Allure Test Report</h1>
            <p>Report generation in progress...</p>
          </body>
          </html>
          EOF
          fi


      - name: Deploy to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-report
          force_orphan: true